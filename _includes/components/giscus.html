{% comment %}
  Giscus Comments Component
  설정: _config.yml의 giscus 섹션
  발급: https://giscus.app
{% endcomment %}

{% if site.giscus.repo_id != "" %}
<script>
(function() {
  var theme = localStorage.getItem('theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  var giscusTheme = theme === 'dark' ? 'dark' : 'light';

  var script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo', '{{ site.giscus.repo }}');
  script.setAttribute('data-repo-id', '{{ site.giscus.repo_id }}');
  script.setAttribute('data-category', '{{ site.giscus.category }}');
  script.setAttribute('data-category-id', '{{ site.giscus.category_id }}');
  script.setAttribute('data-mapping', '{{ site.giscus.mapping | default: "pathname" }}');
  script.setAttribute('data-strict', '0');
  script.setAttribute('data-reactions-enabled', '{{ site.giscus.reactions_enabled | default: "1" }}');
  script.setAttribute('data-emit-metadata', '0');
  script.setAttribute('data-input-position', 'top');
  script.setAttribute('data-theme', giscusTheme);
  script.setAttribute('data-lang', 'ko');
  script.setAttribute('data-loading', 'lazy');
  script.setAttribute('crossorigin', 'anonymous');
  script.async = true;
  document.currentScript.parentElement.appendChild(script);
})();
</script>
{% else %}
<div style="padding: 40px; text-align: center; color: #666; background: #f9f9f9; border-radius: 8px;">
  <p>댓글 기능을 사용하려면 <a href="https://giscus.app" target="_blank" style="color: #e85a4f;">Giscus</a>를 설정해주세요.</p>
  <p style="font-size: 0.9rem; margin-top: 8px;">_config.yml의 giscus 섹션을 채워주세요.</p>
</div>
{% endif %}
