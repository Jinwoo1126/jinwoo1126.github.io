# ============================================================
# Site Settings
# ============================================================
title: dev.log
description: 개발과 기술에 대한 이야기를 기록합니다.
url: "https://jinwoo1126.github.io"
baseurl: ""
lang: ko

# ============================================================
# Author (기본 작성자 - _data/authors.yml에서 추가 가능)
# ============================================================
author:
  name: Jinwoo Jang
  email: wdfrty1234@gmail.com
  bio: "AI 개발자. 좋은 코드와 좋은 경험을 고민합니다."
  avatar: /assets/images/profile.jpg

# ============================================================
# Social Links
# ============================================================
social:
  github: Jinwoo1126
  linkedin: jinwoo1126
  twitter:
  instagram:

# ============================================================
# Blog Settings
# ============================================================
posts_per_page: 10
excerpt_length: 150
show_drafts: false

# ============================================================
# Features (토글 가능)
# ============================================================
features:
  comments: true          # Giscus 댓글
  toc: true               # 목차 자동 생성
  reading_time: true      # 읽기 시간 표시
  related_posts: true     # 관련 글 표시
  share_buttons: false    # 공유 버튼

# ============================================================
# Giscus Comments (https://giscus.app 에서 설정)
# ============================================================
giscus:
  repo: "Jinwoo1126/jinwoo1126.github.io"
  repo_id: "R_kgDOQkGqrg"
  category: "Q&A"
  category_id: "DIC_kwDOQkGqrs4C6q_h"
  mapping: "pathname"
  reactions_enabled: "1"
  theme: "preferred_color_scheme"

# ============================================================
# Google Analytics (GA4)
# ============================================================
google_analytics: "G-KL7VMWG7VJ"

# ============================================================
# Build Settings
# ============================================================
theme: null
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

kramdown:
  input: GFM
  auto_ids: true
  toc_levels: "2..3"
  syntax_highlighter: rouge

# ============================================================
# Sass
# ============================================================
sass:
  style: compressed
  sass_dir: assets/css

# ============================================================
# Collections
# ============================================================
collections:
  posts:
    output: true
    permalink: /posts/:title/

# ============================================================
# Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      toc: true
  - scope:
      path: "pages"
    values:
      layout: "page"

# ============================================================
# Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .obsidian
  - templates
  - "*.code-workspace"
  - .vscode
