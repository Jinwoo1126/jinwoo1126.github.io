# ============================================================
# Site Settings
# ============================================================
title: dev.log
description: 개발과 기술에 대한 이야기를 기록합니다.
url: "https://yourusername.github.io"
baseurl: ""
lang: ko

# ============================================================
# Author (기본 작성자 - _data/authors.yml에서 추가 가능)
# ============================================================
author:
  name: Your Name
  email: your@email.com
  bio: "프론트엔드 개발자. 좋은 코드와 좋은 경험을 고민합니다."
  avatar: /assets/images/profile.jpg

# ============================================================
# Social Links
# ============================================================
social:
  github: yourusername
  linkedin: yourusername
  twitter: 
  instagram: 

# ============================================================
# Blog Settings
# ============================================================
posts_per_page: 10
excerpt_length: 150
show_drafts: false

# ============================================================
# Features (토글 가능)
# ============================================================
features:
  comments: true          # Giscus 댓글
  toc: true               # 목차 자동 생성
  reading_time: true      # 읽기 시간 표시
  related_posts: true     # 관련 글 표시
  share_buttons: false    # 공유 버튼

# ============================================================
# Giscus Comments (https://giscus.app 에서 설정)
# ============================================================
giscus:
  repo: "yourusername/yourusername.github.io"
  repo_id: ""             # giscus.app에서 발급
  category: "Comments"
  category_id: ""         # giscus.app에서 발급
  mapping: "pathname"
  reactions_enabled: "1"
  theme: "light"

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

kramdown:
  input: GFM
  auto_ids: true
  toc_levels: "2..3"
  syntax_highlighter: rouge

# ============================================================
# Sass
# ============================================================
sass:
  style: compressed
  sass_dir: assets/css

# ============================================================
# Collections
# ============================================================
collections:
  posts:
    output: true
    permalink: /posts/:title/

# ============================================================
# Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      toc: true
  - scope:
      path: "pages"
    values:
      layout: "page"

# ============================================================
# Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - .obsidian
  - templates
  - "*.code-workspace"
  - .vscode
